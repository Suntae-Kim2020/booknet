name: booknet
description: 책 등록·관리·판매·독서토론을 위한 모바일 앱
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 상태관리 / 라우팅
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0

  # 네트워크
  dio: ^5.4.0
  http: ^1.2.0

  # 백엔드 (Supabase)
  supabase_flutter: ^2.5.0

  # 인증 (Firebase Auth + 소셜 로그인)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  kakao_flutter_sdk_user: ^1.9.5
  flutter_naver_login: ^1.8.0

  # 바코드 스캔 (ISBN)
  mobile_scanner: ^7.0.0

  # 이미지 촬영
  # google_mlkit_text_recognition: ^0.14.0  # iOS 시뮬레이터 미지원, 실기기에서만 사용

  # 음성 (메모/한줄평 읽어주기)
  flutter_tts: ^4.0.2

  # 위치 / 지역 (독서토론 검색)
  geolocator: ^11.0.0

  # 이미지 / 캐시
  cached_network_image: ^3.3.1

  # 모델 직렬화
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # 환경변수
  flutter_dotenv: ^5.1.0

  # 기타
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  app_links: ^7.0.0
  url_launcher: ^6.3.2
  flutter_web_auth_2: ^5.0.2
  speech_to_text: ^7.3.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - .env
