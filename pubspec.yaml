name: booknet
description: 책 등록·관리·판매·독서토론을 위한 모바일 앱
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 상태관리 / 라우팅
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0

  # 네트워크
  dio: ^5.4.0
  http: ^1.2.0

  # 백엔드 (Supabase)
  supabase_flutter: ^2.5.0

  # 바코드 스캔 (ISBN)
  mobile_scanner: ^5.0.0

  # 음성 (한 줄 평 읽어주기)
  flutter_tts: ^4.0.2

  # 위치 / 지역 (독서토론 검색)
  geolocator: ^11.0.0

  # 이미지 / 캐시
  cached_network_image: ^3.3.1

  # 모델 직렬화
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # 환경변수
  flutter_dotenv: ^5.1.0

  # 기타
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - .env
